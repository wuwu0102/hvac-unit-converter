<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HVAC Unit Converter V0.2</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f5f7fb;
        color: #1f2937;
      }

      .container {
        max-width: 840px;
        margin: 0 auto;
      }

      h1 {
        margin-bottom: 20px;
        font-size: 2rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 1.1rem;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 10px;
      }

      input,
      select {
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 0.95rem;
      }

      .result {
        font-size: 0.95rem;
        color: #374151;
        min-height: 1.4em;
      }

      .result-list {
        margin: 0;
        padding: 0;
        list-style: none;
        color: #374151;
      }

      .result-row {
        display: grid;
        grid-template-columns: 72px 12px minmax(0, 1fr);
        gap: 8px;
        margin: 6px 0;
        align-items: baseline;
      }

      .result-unit {
        width: 72px;
      }

      .result-colon {
        width: 12px;
        text-align: center;
      }

      .result-value {
        text-align: right;
        font-family: monospace;
      }

      .debug-panel {
        margin-top: 20px;
        background: #111827;
        color: #e5e7eb;
        border-radius: 10px;
        padding: 14px 16px;
        font-size: 0.9rem;
      }

      .debug-panel h2 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .debug-panel ul {
        margin: 0;
        padding-left: 18px;
      }

      .debug-panel li {
        margin: 5px 0;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>HVAC Unit Converter V0.2</h1>
      <section class="grid">
        <article class="card" data-type="temp">
          <h2>Temperature</h2>
          <div class="row">
            <input type="number" step="any" placeholder="Enter value" />
            <select data-role="from-unit">
              <option value="C">C</option>
              <option value="F">F</option>
            </select>
          </div>
          <div class="result">Result: -</div>
        </article>

        <article class="card" data-type="airflow">
          <h2>Airflow</h2>
          <div class="row">
            <input type="number" step="any" placeholder="Enter value" />
            <select data-role="from-unit">
              <option value="CFM">CFM</option>
              <option value="CMH">CMH</option>
              <option value="m3/s">m3/s</option>
              <option value="L/s">L/s</option>
              <option value="LPM">LPM (L/min)</option>
              <option value="CMM">CMM (m3/min)</option>
            </select>
          </div>
          <ul class="result-list" data-role="result-list"></ul>
        </article>

        <article class="card" data-type="pressure">
          <h2>Pressure</h2>
          <div class="row">
            <input type="number" step="any" placeholder="Enter value" />
            <select data-role="from-unit">
              <option value="Pa">Pa</option>
              <option value="kPa">kPa</option>
              <option value="mmAq">mmAq</option>
              <option value="bar">bar</option>
              <option value="psi">psi</option>
              <option value="N/m2">N/m2</option>
            </select>
          </div>
          <ul class="result-list" data-role="result-list"></ul>
        </article>
      </section>

      <section class="debug-panel" data-role="debug-panel" aria-live="polite">
        <h2>Debug Info</h2>
        <ul>
          <li>app loaded: <span data-role="debug-app-loaded">false</span></li>
          <li>cards initialized count: <span data-role="debug-cards-count">0</span></li>
          <li>last updated card: <span data-role="debug-last-card">-</span></li>
          <li>last input value: <span data-role="debug-last-value">-</span></li>
          <li>last selected unit: <span data-role="debug-last-unit">-</span></li>
          <li>last error: <span data-role="debug-last-error">-</span></li>
        </ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
