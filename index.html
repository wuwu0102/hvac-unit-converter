<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HVAC Unit Converter</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f5f7fb;
        color: #1f2937;
      }

      .container {
        max-width: 840px;
        margin: 0 auto;
      }

      h1 {
        margin-bottom: 20px;
        font-size: 2rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 1.1rem;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 10px;
      }

      input,
      select {
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 0.95rem;
      }

      .result {
        font-size: 0.95rem;
        color: #374151;
        min-height: 1.4em;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>HVAC Unit Converter</h1>
      <section class="grid">
        <article class="card" data-type="temp">
          <h2>Temperature</h2>
          <div class="row">
            <input type="number" step="any" placeholder="Enter value" />
            <select data-role="from-unit">
              <option value="C">C</option>
              <option value="F">F</option>
            </select>
          </div>
          <div class="row">
            <span></span>
            <select data-role="to-unit">
              <option value="F">F</option>
              <option value="C">C</option>
            </select>
          </div>
          <div class="result">Result: -</div>
        </article>

        <article class="card" data-type="airflow">
          <h2>Airflow</h2>
          <div class="row">
            <input type="number" step="any" placeholder="Enter value" />
            <select data-role="from-unit">
              <option value="CFM">CFM</option>
              <option value="CMH">CMH</option>
              <option value="m3/s">m3/s</option>
              <option value="L/s">L/s</option>
            </select>
          </div>
          <div class="row">
            <span></span>
            <select data-role="to-unit">
              <option value="CMH">CMH</option>
              <option value="CFM">CFM</option>
              <option value="m3/s">m3/s</option>
              <option value="L/s">L/s</option>
            </select>
          </div>
          <div class="result">Result: -</div>
        </article>

        <article class="card" data-type="pressure">
          <h2>Pressure</h2>
          <div class="row">
            <input type="number" step="any" placeholder="Enter value" />
            <select data-role="from-unit">
              <option value="Pa">Pa</option>
              <option value="kPa">kPa</option>
              <option value="mmAq">mmAq</option>
              <option value="bar">bar</option>
            </select>
          </div>
          <div class="row">
            <span></span>
            <select data-role="to-unit">
              <option value="kPa">kPa</option>
              <option value="Pa">Pa</option>
              <option value="mmAq">mmAq</option>
              <option value="bar">bar</option>
            </select>
          </div>
          <div class="result">Result: -</div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
