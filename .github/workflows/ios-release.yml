name: iOS Release TestFlight

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"

      - name: Flutter Clean
        run: flutter clean

      - name: Install Dependencies
        run: flutter pub get

      # 🔥 重建乾淨 iOS（避免 xcodeproj 壞掉）
      - name: Recreate iOS project
        run: |
          set -euo pipefail
          rm -rf ios
          flutter create . --platforms=ios --org com.wuwu0102 --project-name hvac_unit_converter
          
          # 設定 bundle id
          sed -i '' 's/com.example.hvacUnitConverter/com.wuwu0102.hvacconverter/g' ios/Runner.xcodeproj/project.pbxproj
          
          # App 名稱
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName HVAC Converter" ios/Runner/Info.plist || true

      # 🔥 產生 IPA（關鍵修正）
      - name: Build IPA
        run: flutter build ipa --release

      # 🔥 上傳 TestFlight
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
