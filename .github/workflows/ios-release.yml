name: iOS Release TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Regenerate clean iOS project
        run: |
          set -euo pipefail
          rm -rf ios
          flutter create . --platforms=ios --org com.wuwu0102 --project-name hvac_unit_converter

      - name: Validate required files
        run: |
          set -euo pipefail
          test -d ios/Runner.xcodeproj
          test -d ios/Runner.xcworkspace
          test -f ios/Runner/Info.plist
          test -f lib/main.dart

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Build web release
        run: flutter build web --release

      - name: Build iOS release without codesign
        run: flutter build ios --release --no-codesign

      - name: Verify Runner workspace can be opened
        run: xcodebuild -list -workspace ios/Runner.xcworkspace

      - name: Verify Runner scheme build settings
        run: xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -showBuildSettings
