name: iOS Simulator Build (No Signing)

on:
  pull_request:
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for iPhone Simulator (no signing)
        run: |
          xcodebuild \
            -project HVACConverter.xcodeproj \
            -scheme HVACConverteriOS \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            build
