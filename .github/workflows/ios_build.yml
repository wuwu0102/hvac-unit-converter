name: Build iOS Flutter

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Show Flutter version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Pub get
        run: flutter pub get

      - name: Verify iOS files
        run: |
          test -d ios
          test -f ios/Runner.xcworkspace/contents.xcworkspacedata
          test -f ios/Runner.xcodeproj/project.pbxproj
          test -f ios/Runner/Info.plist
          grep -R "com.wuwu0102.hvacconverter" ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS no codesign
        run: flutter build ios --release --no-codesign

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/
